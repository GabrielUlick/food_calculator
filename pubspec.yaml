
name: food_calculator
description: Aplicativo para cálculo de calorias e nutrientes de refeições
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  # Gerenciamento de estado
  provider: ^6.1.1
  # Banco de dados local
  sqflite: ^2.3.0
  path: ^1.8.3
  # Gráficos
  fl_chart: ^0.65.0
  # Ícones
  font_awesome_flutter: ^10.6.0
  # Formatação de datas
  intl: ^0.17.0
  # Armazenamento local
  shared_preferences: ^2.2.2
  # Animações
  animations: ^2.0.11
  # Gerenciamento de datas
  date_time_picker: ^2.1.0
  # Geração de UUID
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
